name: himnario_id_2
description: Himnario Digital Multiplataforma con control remoto LAN, transposición de acordes y sistema de arreglos personalizados.
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Comunicación LAN (gRPC + mDNS)
  grpc: ^5.1.0
  bonsoir: ^6.1.0

  # Base de datos local (SQLite)
  sqflite: ^2.4.1
  sqflite_common: ^2.5.4
  sqflite_common_ffi: ^2.3.7

  # Criptografía (SHA256 para hashing de contraseñas)
  crypto: ^3.0.0
  path_provider: ^2.1.0
  path: ^1.9.0

  # State Management
  flutter_riverpod: ^2.6.0

  # Modelos Inmutables
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0

  # Proto
  protobuf: ^6.0.0

  # Permisos runtime (Android 13+ NEARBY_WIFI_DEVICES)
  permission_handler: ^11.3.0

  # Audio
  audioplayers: ^6.6.0

  # UI Desktop
  window_manager: ^0.5.1
  desktop_multi_window: ^0.3.0

  # File Picker
  file_picker: ^8.0.0

  # Utilidades
  uuid: ^4.4.0
  collection: ^1.19.0
  equatable: ^2.0.5
  intl: ^0.19.0
  logging: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

  # Code Generation
  build_runner: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0

  # Testing
  mocktail: ^1.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/db/himnario_id.db
    - assets/database/
    - assets/audio/
    - assets/images/backgrounds/

  fonts:
    - family: Merriweather
      fonts:
        - asset: assets/fonts/Merriweather-Variable.ttf
    - family: Lora
      fonts:
        - asset: assets/fonts/Lora-Variable.ttf
    - family: Playfair Display
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Variable.ttf
    - family: Cinzel
      fonts:
        - asset: assets/fonts/Cinzel-Variable.ttf
