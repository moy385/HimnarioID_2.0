name: himnario_id_2
description: Himnario Digital Multiplataforma con control remoto LAN, transposición de acordes y sistema de arreglos personalizados.
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Comunicación LAN (gRPC + mDNS)
  grpc: ^5.1.0
  multicast_dns: ^0.3.3

  # Base de datos local (SQLite)
  sqflite_common_ffi: ^2.3.7
  path_provider: ^2.1.0
  path: ^1.9.0

  # State Management
  flutter_riverpod: ^2.6.0

  # Modelos Inmutables
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0

  # Audio
  audioplayers: ^6.6.0

  # UI Desktop
  window_manager: ^0.5.1

  # Utilidades
  uuid: ^4.4.0
  collection: ^1.19.0
  equatable: ^2.0.5
  intl: ^0.19.0
  logging: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

  # Code Generation
  build_runner: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0

  # Testing
  mocktail: ^1.0.0

flutter:
  uses-material-design: true
