name: Build Linux (.tar.gz)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Build version label (e.g. 2.0.1)'
        required: false
        default: 'latest'
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.41.9'
          cache: true

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install Linux build prerequisites
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      - name: Get dependencies
        run: flutter pub get

      - name: Build Linux release
        run: flutter build linux --release

      - name: Package tar.gz
        run: |
          cd build/linux/x64/release
          tar -czf ../../../MQ_App-linux-x64.tar.gz bundle/
          cd ../../..
          ls -lh MQ_App-linux-x64.tar.gz

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ github.ref_name }} MQ_App-linux-x64.tar.gz --clobber

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: MQ_App-linux-x64_${{ github.event.inputs.version || github.ref_name }}
          path: MQ_App-linux-x64.tar.gz
          compression-level: 0
