name: Build macOS (.dmg)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Build version label (e.g. 2.0.1)'
        required: false
        default: 'latest'
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build macOS release (unsigned)
        run: flutter build macos --release --no-codesign

      - name: Package .dmg
        run: |
          APP_BUNDLE="build/macos/Build/Products/Release/Runner.app"
          DMG_NAME="MQ_App-macos-x64"
          mkdir -p dist

          # Usar create-dmg para una ventana de instalacion bonita
          npm install -g create-dmg 2>/dev/null
          create-dmg \
            --volname "MQ App" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --app-drop-link 450 170 \
            --icon "Runner" 150 170 \
            --no-internet-enable \
            "${DMG_NAME}.dmg" \
            "${APP_BUNDLE}" || \
          # Fallback: hdiutil (viene instalado en macOS)
          (
            mkdir -p dmg_temp
            cp -R "${APP_BUNDLE}" dmg_temp/
            ln -s /Applications dmg_temp/Applications
            hdiutil create \
              -volname "MQ App" \
              -srcfolder dmg_temp \
              -ov -format UDZO \
              "${DMG_NAME}.dmg"
            rm -rf dmg_temp
          )

          mv "${DMG_NAME}.dmg" dist/
          ls -lh dist/

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ github.ref_name }} dist/MQ_App-macos-x64.dmg --clobber

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: MQ_App-macos-x64_${{ github.event.inputs.version || github.ref_name }}
          path: dist/MQ_App-macos-x64.dmg
          compression-level: 0
