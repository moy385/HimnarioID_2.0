name: Build Windows .exe

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Build version label (e.g. 2.0.1)'
        required: false
        default: 'latest'
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Zip build output
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath MQ_App-windows-x64.zip

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.version }}"
          fi
          gh release upload "$TAG" MQ_App-windows-x64.zip --clobber

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: MQ_App-windows-x64_${{ github.event.inputs.version || github.ref_name }}
          path: MQ_App-windows-x64.zip
          compression-level: 0
